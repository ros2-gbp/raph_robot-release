[tool.black]
# We use ruff for formatting, but black formatter should be compatible with ruff.
line-length = 100

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    # "AIR",  # Airflow, We don't use this framework
    "ERA",  # Eradicate
    # "FAST", # FastAPI, We don't use this framework

    # flake8 extensions
    "YTT",    # flake8-2020
    "ANN",    # flake8-annotations,
    "ASYNC",  # flake8-async
    "S",      # flake8-bandit,
    "BLE",    # flake8-blind-except
    "FBT",    # flake8-boolean-trap
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "COM",    # flake8-commas
    "C4",     # flake8-comprehensions
    # "CPY",  # flake8-copyright, preview feature
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    # "DJ",   # flake8-django, We don't use this framework
    "EM",     # flake8-errmsg
    "EXE",    # flake8-executable
    # "FIX",  # flake8-fixme
    "FA",     # flake8-future-annotations
    "INT",    # flake8-gettext
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "LOG",    # flake8-logging
    # "G",    # flake8-logging-format
    "INP",    # flake8-no-pep420
    "PIE",    # flake8-pie
    "T20",    # flake8-print
    "PYI",    # flake8-pyi
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SLF",    # flake8-self
    "SIM",    # flake8-simplify
    "SLOT",   # flake8-slots
    "TID",    # flake8-tidy-imports
    # "TD",   # flake8-todos, We don't enforce format for TODO comments
    "TC",     # flake8-type-checking
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib

    "FLY",    # flynt
    "I",      # isort
    "C90",    # mccabe
    "NPY",    # numpy
    # "PD",   # pandas-vet
    "N",      # pep8-naming
    "PERF",   # Perflint
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    # "DOC",  # pydoclint, preview feature
    "D",      # pydocstyle
    "F",      # pyflakes
    "PGH",    # pygrep-hooks
    "PL",     # pylint
    "UP",     # pyupgrade
    "FURB",   # refurb
    "RUF",    # ruff
    "TRY",    # tryceratops
]
ignore = [
    # Conflicting pydocstyle rules
    "D203", # incorrect-blank-line-before-class
    "D212", # multi-line-summary-first-line

    # Allow missing docstrings in public modules or packages
    "D100",
    "D104",

    # Pylint "too-many" errors
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0914",
    "PLR0915",
    "PLR0916",
    "PLR0917",

    "PLR2004", # magic-value-comparison

    "UP047", # non-pep695-generic-function, mypy doesn't support this yet
]

mccabe.max-complexity = 10

pycodestyle.max-line-length = 100
